name: STRATWATCH Intelligence Run

on:
  schedule:
    # 11:00 UTC = 6:00am ET daily
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run intelligence gathering
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
        run: node run.js

      - name: Commit and push intelligence data
        run: |
          git config user.name "STRATWATCH Bot"
          git config user.email "stratwatch@github-actions"
          git add docs/intelligence.json
          git diff --staged --quiet || git commit -m "intelligence update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
